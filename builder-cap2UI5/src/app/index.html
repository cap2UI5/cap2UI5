<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cap2UI5 Starter</title>

    <!-- UI5 bootstrap — served locally from the pinned openui5-dist dependency
         (see srv/server.js), so the starter runs fully offline. -->
    <script id="sap-ui-bootstrap"
            src="resources/sap-ui-core.js"
            data-sap-ui-theme="sap_horizon"
            data-sap-ui-libs="sap.m,sap.ui.layout"
            data-sap-ui-async="true"
            data-sap-ui-compatVersion="edge"></script>

    <script>
        // Starter roundtrip through all three layers, using the REAL cap2UI5
        // service — the same endpoint and wire format the full z2ui5 frontend
        // (app/z2ui5/webapp) speaks:
        //
        //   frontend (this page)
        //     → POST /rest/root/z2ui5  { value: { S_FRONT: {...} } }   (service layer)
        //       → draft persisted in cap2ui5.z2ui5_t_01              (database layer)
        //     ← { S_FRONT: { APP, ID, PARAMS: { S_VIEW: { XML } } }, MODEL }
        //
        // The response's draft ID is the row key in z2ui5_t_01; the row count
        // is read back through the AdminService OData endpoint as proof the
        // database layer is involved.
        async function roundtrip() {
            const response = await fetch("rest/root/z2ui5", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    value: {
                        S_FRONT: {
                            ORIGIN: window.location.origin,
                            PATHNAME: window.location.pathname,
                            SEARCH: window.location.search,
                            HASH: window.location.hash
                        }
                    }
                })
            });
            if (!response.ok) {
                throw new Error("HTTP " + response.status + " — " + await response.text());
            }
            return response.json();
        }

        async function draftCount() {
            const response = await fetch("odata/v4/admin/z2ui5_t_01/$count");
            if (!response.ok) {
                throw new Error("HTTP " + response.status + " — " + await response.text());
            }
            return Number(await response.text());
        }

        sap.ui.getCore().attachInit(function () {
            sap.ui.require([
                "sap/m/App", "sap/m/Page", "sap/m/Panel", "sap/m/VBox",
                "sap/m/Label", "sap/m/Text", "sap/m/Button", "sap/m/Link",
                "sap/m/MessageStrip", "sap/m/MessageToast",
                "sap/ui/core/mvc/XMLView", "sap/ui/core/mvc/Controller",
                "sap/ui/model/json/JSONModel"
            ], function (App, Page, Panel, VBox, Label, Text, Button, Link,
                         MessageStrip, MessageToast, XMLView, Controller, JSONModel) {

                const model = new JSONModel({
                    app: "", draftId: "", rows: 0, error: "", busy: false
                });

                const viewPanel = new Panel({
                    headerText: "UI5 view rendered from the backend's XML response",
                    expandable: false,
                    height: "34rem"
                }).addStyleClass("sapUiSmallMarginTop");

                // Backend views wire their events to .eB(...) — that protocol is
                // implemented by the full z2ui5 frontend, not by this starter.
                const StarterController = Controller.extend("starter.Shim", {
                    eB: function () {
                        MessageToast.show(
                            "Events are handled by the full z2ui5 frontend — " +
                            "open /z2ui5/webapp/index.html"
                        );
                    }
                });

                let currentView = null;

                function send() {
                    model.setProperty("/busy", true);
                    model.setProperty("/error", "");
                    roundtrip().then(async function (data) {
                        model.setProperty("/app", data.S_FRONT.APP);
                        model.setProperty("/draftId", data.S_FRONT.ID);
                        model.setProperty("/rows", await draftCount());

                        const view = await XMLView.create({
                            definition: data.S_FRONT.PARAMS.S_VIEW.XML,
                            controller: new StarterController()
                        });
                        view.setModel(new JSONModel(data.MODEL));
                        if (currentView) { currentView.destroy(); }
                        currentView = view;
                        viewPanel.removeAllContent();
                        viewPanel.addContent(view);
                    }).catch(function (err) {
                        model.setProperty("/error", String(err.message || err));
                    }).finally(function () {
                        model.setProperty("/busy", false);
                    });
                }

                const page = new Page({
                    title: "cap2UI5 Starter — Frontend · Service · Database",
                    content: [
                        new VBox({
                            items: [
                                new Button({
                                    text: "POST /rest/root/z2ui5",
                                    type: "Emphasized",
                                    enabled: "{= !${/busy}}",
                                    press: send
                                }),
                                new MessageStrip({
                                    text: "{/error}",
                                    type: "Error",
                                    showIcon: true,
                                    visible: "{= !!${/error}}"
                                }).addStyleClass("sapUiSmallMarginTop"),
                                new Label({ text: "Backend app class" })
                                    .addStyleClass("sapUiSmallMarginTop"),
                                new Text({ text: "{/app}" }),
                                new Label({ text: "Draft id (row key in table cap2ui5.z2ui5_t_01)" })
                                    .addStyleClass("sapUiTinyMarginTop"),
                                new Text({ text: "{/draftId}" }),
                                new Label({ text: "Rows in cap2ui5.z2ui5_t_01 (via AdminService)" })
                                    .addStyleClass("sapUiTinyMarginTop"),
                                new Text({ text: "{/rows}" }),
                                new Link({
                                    text: "Open the full z2ui5 frontend →",
                                    href: "z2ui5/webapp/index.html"
                                }).addStyleClass("sapUiSmallMarginTop"),
                                viewPanel
                            ]
                        }).addStyleClass("sapUiMediumMargin")
                    ]
                });

                new App({ pages: [page], models: model }).placeAt("content");

                send();
            });
        });
    </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
