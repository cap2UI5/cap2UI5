name: test

# Runs the CAP app's jest suite on every pull request (and on pushes to
# main — including the publish commits builder-cap2UI5 pushes here).
# Make this check "Required" in the branch protection rules of `main` so a
# PR can only be merged once the tests pass.
#
# Note: this repository is generated by cap2UI5/builder-cap2UI5 — do not
# hand-edit anything outside .github/ here; change builder-cap2UI5:src/
# instead.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      # one install covers the app AND the vendored core/ (its deps are
      # part of the app lock, placed under core/node_modules/)
      - run: npm ci
      - run: npm test
