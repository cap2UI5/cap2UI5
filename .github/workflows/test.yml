name: test

# Runs the Jest test suite on every pull request (and on pushes to main).
# Make this check "Required" in the branch protection rules of `main` so a PR
# can only be merged once the tests pass — see README / repo Settings > Branches.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            builder-abap2UI5-js/package-lock.json
            builder-abap2UI5-js/core/package-lock.json
            cap2UI5/package-lock.json
            builder-abap2UI5-js/adapters/cap/package-lock.json
            builder-abap2UI5-js/adapters/node/package-lock.json
            builder-abap2UI5-js/adapters/express/package-lock.json
            builder-abap2UI5-js/adapters/web/package-lock.json
      # dev tooling (jest) lives in the builder-abap2UI5-js project; the runtime deps
      # the tests import (@sap/cds, @cap-js/sqlite, …) live in the CAP project
      # cap2UI5/.
      - run: npm ci
        working-directory: builder-abap2UI5-js
      - run: npm ci
        working-directory: builder-abap2UI5-js/core
      - run: npm ci
        working-directory: cap2UI5
      # platform adapters — armed as smoke gates in the jest suite
      # (builder-abap2UI5-js/test/adapters.test.js skips them when not installed)
      - run: npm ci
        working-directory: builder-abap2UI5-js/adapters/cap
      - run: npm ci
        working-directory: builder-abap2UI5-js/adapters/node
      - run: npm ci
        working-directory: builder-abap2UI5-js/adapters/express
      - run: npm ci
        working-directory: builder-abap2UI5-js/adapters/web
      - run: npm test
        working-directory: builder-abap2UI5-js
      - run: npm test
        working-directory: cap2UI5
