name: abap2UI5 transpile

# Transpile the framework classes from abap2UI5-js/run/input/abap2UI5/src into abap2UI5-js/run/output/abap2UI5
# (+ transpile report). Step 2 of the update_backend pipeline.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            abap2UI5-js/package-lock.json
            cap2UI5/package-lock.json
      - run: npm ci
        working-directory: abap2UI5-js
      - run: npm ci
        working-directory: cap2UI5
      - run: npm run transpile_abap2ui5
        working-directory: abap2UI5-js
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add abap2UI5-js/run/output/abap2UI5
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "transpile: update abap2UI5-js/run/output/abap2UI5 ($(cut -c1-12 abap2UI5-js/run/input/abap2UI5/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
