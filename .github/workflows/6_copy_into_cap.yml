name: 6 copy into cap

# Step 6: plain copy of the output/ folders into the CAP project —
# output/abap2UI5 -> cap2UI5/srv/z2ui5, output/samples -> cap2UI5/srv/samples,
# output/app -> cap2UI5/app/z2ui5/webapp. Jest runs afterwards (non-blocking
# visibility into what the copy did to the suite).

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix cap2UI5
      - run: npm run copy_into_cap
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cap2UI5/srv cap2UI5/app
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "sync: copy output/ into cap2UI5"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
      - run: npm test
