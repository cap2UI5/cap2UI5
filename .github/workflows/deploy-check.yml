name: deploy check

# Production build gate for the deployable CAP app this repo owns.
#
# What this gate covers — and why it is shaped this way:
# - `npx cds build --production` is the real check. It compiles the full
#   CDS model + service (db + srv, including the imported Northwind model)
#   exactly as a BTP deployment would, so a broken model, broken service
#   wiring or a broken `cds build --production` is caught on every PR and
#   push to main instead of at deploy time. (Two harmless Edm.Double key
#   warnings from the imported Northwind model are expected.)
# - The build output for the deployable server module (gen/srv) is then
#   asserted to exist, guarding against `cds build` exiting 0 without
#   actually producing the module.
#
# Why NOT a full `npx mbt build` of the MTA archive:
#   mta.yaml's html5 module `abap2UI5` (path app/z2ui5) builds with
#   `npm install && npm run build:cf`, but the *generated* app/z2ui5 ships
#   only a webapp/ folder — no package.json and no `build:cf` script — so
#   that module's build can never succeed here. The scaffolding for it is
#   owned upstream (builder-cap2UI5:src/), not in this repo: everything
#   outside .github/ is a generated artifact, wiped and rewritten on every
#   publish, so it cannot be fixed here. Running the full `mbt build` in
#   this repo therefore only ever fails on that upstream gap, which this
#   repo cannot close. The full-archive / html5 deployability gate belongs
#   in builder-cap2UI5; this workflow gates the CAP production build that
#   this repo actually owns.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # one install covers the app AND the vendored core (its deps are part
      # of the app lock, placed under core/node_modules/)
      - run: npm ci
      # the real gate: production CAP build (db + srv), as BTP would run it
      - run: npx cds build --production
      # guard against cds build exiting 0 without producing the server module
      - name: verify server module was built
        run: test -f gen/srv/srv/server.js && test -f gen/srv/package.json
