name: deploy check

# Production build gate for the deployable CAP app this repo owns.
#
# What this gate covers — and why it is shaped this way:
# - `npx cds build --production` is the real check. It compiles the full
#   CDS model + service (db + srv, including the imported Northwind model)
#   exactly as a BTP deployment would, so a broken model, broken service
#   wiring or a broken `cds build --production` is caught on every PR and
#   push to main instead of at deploy time. (Two harmless Edm.Double key
#   warnings from the imported Northwind model are expected.)
# - The build output for the deployable server module (gen/srv) is then
#   asserted to exist, guarding against `cds build` exiting 0 without
#   actually producing the module.
#
# Why NOT a full `npx mbt build` of the MTA archive:
#   The whole app under app/z2ui5 (and mta.yaml itself) is a generated
#   artifact — everything outside .github/ is wiped and rewritten on every
#   publish, so it cannot be fixed here; its source lives in
#   builder-cap2UI5:src/. A full `mbt build` also builds the html5 module
#   `abap2UI5` (path app/z2ui5) via `npm install && npm run build:cf`, so
#   gating it here would couple this repo's CI to that generated frontend
#   build. That html5-module deployability is instead gated at its source:
#   builder-cap2UI5 ships app/z2ui5's package.json / ui5.yaml / xs-app.json
#   and its assemble step is covered by the builder's own tests. This
#   workflow gates the CAP production build that maps to this repo's own
#   server module.
#
#   (History: app/z2ui5 previously shipped without that scaffolding, so a
#   full `mbt build` here failed with `Missing script: "build:cf"` — the
#   original reason this gate was narrowed. That gap is now fixed upstream.)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # one install covers the app AND the vendored core (its deps are part
      # of the app lock, placed under core/node_modules/)
      - run: npm ci
      # the real gate: production CAP build (db + srv), as BTP would run it
      - run: npx cds build --production
      # guard against cds build exiting 0 without producing the server module
      - name: verify server module was built
        run: test -f gen/srv/srv/server.js && test -f gen/srv/package.json
