name: 6 copy frontend

# Step 6: copy the frontend from input/abap2UI5/app/webapp into
# cap2UI5/app/z2ui5/webapp and apply the two cap2UI5 patches.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run copy_frontend
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cap2UI5/app
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "sync: copy frontend into cap2UI5 ($(cut -c1-12 input/abap2UI5/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
