name: trigger web

# Kick the browser build in builder-cap2UI5-web. Writes the sha of this
# repo's HEAD into builder-cap2UI5-web:UPSTREAM_HEAD and pushes it via a
# deploy key registered on builder-cap2UI5-web with write access (private
# half: secret ACTION_KEY_WEB here) — that push starts builder-cap2UI5-web's
# "build web" workflow, which mirrors this repo and redeploys the site.
# Same pattern as abap2UI5's trigger_cap. Manual only (workflow_dispatch):
# run it whenever a rebuild of the browser site should be kicked off — e.g.
# after builder-cap2UI5 published a new app build here. If the sha is
# unchanged since the last trigger, nothing is pushed and
# builder-cap2UI5-web does not rebuild.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    concurrency:
      group: trigger-web
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - name: push trigger commit to builder-cap2UI5-web
        env:
          ACTION_KEY_WEB: ${{ secrets.ACTION_KEY_WEB }}
        run: |
          if [ -z "$ACTION_KEY_WEB" ]; then
            echo "::warning::secret ACTION_KEY_WEB not set — skipping web trigger"
            exit 0
          fi
          key_file="$(mktemp)"
          printf '%s\n' "$ACTION_KEY_WEB" > "$key_file"
          export GIT_SSH_COMMAND="ssh -i $key_file -o StrictHostKeyChecking=accept-new"
          sha="$(git rev-parse HEAD)"
          git clone --depth 1 git@github.com:cap2UI5/builder-cap2UI5-web.git /tmp/web
          echo "$sha" > /tmp/web/UPSTREAM_HEAD
          cd /tmp/web
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add UPSTREAM_HEAD
          if git diff --cached --quiet; then
            echo "builder-cap2UI5-web already at ${sha} — nothing to trigger"
          else
            git commit -m "trigger: rebuild for cap2UI5/cap2UI5@${sha:0:12}"
            git push origin HEAD:main
          fi
