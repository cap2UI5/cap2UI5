name: 1 mirror input

# Snapshots the abap2UI5 sources (src/ + app/webapp) into input/ — the other
# sync workflows work on this versioned copy. Runs standalone via dispatch or
# as the first step of the sync pipeline (sync.yml).

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run mirror_input
      - name: commit input/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add input
          if git diff --cached --quiet; then
            echo "input/ unchanged — nothing to commit"
          else
            git commit -m "mirror: update input/ from abap2UI5 ($(cut -c1-12 input/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
