name: 3 sync backend

# Transpiles the abap2UI5 app layer (z2ui5_cl_app_*, z2ui5_cl_pop_* under
# src/02) from input/src into cap2UI5/srv/z2ui5/02 via scripts/abap2js.js.
# A transpile result with TODO(abap2js) markers never replaces an existing
# file (reported as skipped), and the jest suite must pass before anything
# is committed. Requires input/ — run "1 mirror input" first.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix cap2UI5
      - run: npm run sync_backend
      - run: npm test
      - name: commit backend
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cap2UI5/srv
          if git diff --cached --quiet; then
            echo "backend unchanged — nothing to commit"
          else
            git commit -m "sync: transpile app layer from input/ ($(cut -c1-12 input/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
