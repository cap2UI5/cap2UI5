name: 4 transpile samples

# Step 4: transpile all sample classes from input/samples into
# output/samples + transpile report.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix cap2UI5
      - run: npm run transpile_samples
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/samples
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "transpile: update output/samples ($(cut -c1-12 input/samples/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
