name: nightly samples sync

# Nightly refresh of the bundled samples only:
#   2 mirror samples   -> snapshot abap2UI5/samples (src/, cloud branch) into input/samples/
#   4 transpile samples -> input/samples -> output/samples
#   6 copy into cap    -> output/samples -> cap2UI5/srv/app/samples (jest-gated commit)
#
# Reuses the same reusable workflows as the full sync pipeline (steps 2, 4, 6)
# and skips the abap2UI5 framework and webapp steps. Also runnable on demand
# via workflow_dispatch. Scheduled workflows run on the default branch, so this
# takes effect once merged to main.

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC every night
  workflow_dispatch:

permissions:
  contents: write

# Share the sync pipeline's concurrency group so a nightly run and an
# event-driven full sync never race on the sync commits to main.
concurrency:
  group: sync-pipeline
  cancel-in-progress: false

jobs:
  mirror_samples:
    uses: ./.github/workflows/2_mirror_samples.yml
  transpile_samples:
    needs: mirror_samples
    uses: ./.github/workflows/4_transpile_samples.yml
  copy_into_cap:
    needs: transpile_samples
    uses: ./.github/workflows/6_copy_into_cap.yml
