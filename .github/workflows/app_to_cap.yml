name: app to CAP

# Rebuild the CAP project from builder/base + the generated trees
# (assemble → publish) after the frontend prepare refreshed run/output/app.
# Jest gates the commit. Step 3 of the update_frontend pipeline.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            builder/package-lock.json
            cap2UI5/package-lock.json
      - run: npm ci
        working-directory: builder
      - run: npm ci
        working-directory: cap2UI5
      - run: npm run build_cap
        working-directory: builder
      - run: npm test
        working-directory: builder
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cap2UI5
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "build: regenerate cap2UI5 (frontend sync)"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
