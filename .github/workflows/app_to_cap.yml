name: app to CAP

# Copy the prepared frontend from builder/run/output/app into
# cap2UI5/app/z2ui5/webapp (replaced 1:1). Jest gates the commit. Step 3 of
# the update_frontend pipeline.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            builder/package-lock.json
            cap2UI5/package-lock.json
      - run: npm ci
        working-directory: builder
      - run: npm ci
        working-directory: cap2UI5
      - run: npm run copy_app
        working-directory: builder
      - run: npm test
        working-directory: builder
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add builder/run/output/app cap2UI5/app/z2ui5/webapp
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "sync: copy app into cap2UI5/app/z2ui5/webapp"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
