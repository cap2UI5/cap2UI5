name: app to CAP

# Build the ready-to-serve frontend (input/abap2UI5/app/webapp + the two
# cap2UI5 patches -> output/app) and copy it into cap2UI5/app/z2ui5/webapp
# (replaced 1:1). Jest gates the commit. Step 2 of the update_frontend pipeline.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix cap2UI5
      - run: npm run prepare_app
      - run: npm run copy_app
      - run: npm test
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/app cap2UI5/app/z2ui5/webapp
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "sync: copy app into cap2UI5/app/z2ui5/webapp"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
