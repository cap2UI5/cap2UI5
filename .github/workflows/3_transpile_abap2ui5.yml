name: 3 transpile abap2UI5

# Step 3: transpile every abap2UI5 class (whole src/ tree) from
# input/abap2UI5 into output/abap2UI5 + transpile report.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix cap2UI5
      - run: npm run transpile_abap2ui5
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/abap2UI5
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "transpile: update output/abap2UI5 ($(cut -c1-12 input/abap2UI5/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
