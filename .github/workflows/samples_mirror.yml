name: samples mirror

# Mirror the abap2UI5/samples cloud branch (whole branch, 1:1) into framework/run/input/samples/.
# Step 1 of the update_samples pipeline; also runnable standalone.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm run mirror_samples
        working-directory: framework
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add framework/run/input/samples
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "mirror: update framework/run/input/samples ($(cut -c1-12 framework/run/input/samples/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
