name: 5 copy backend

# Step 5: copy the transpiled classes from output/ into cap2UI5 (srv/z2ui5/02
# and srv/samples). Gate: TODO-marked results never replace existing files,
# and the jest suite must pass before anything is committed.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix cap2UI5
      - run: npm run copy_backend
      - run: npm test
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cap2UI5/srv
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "sync: copy transpiled backend into cap2UI5"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
