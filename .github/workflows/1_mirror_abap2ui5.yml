name: 1 mirror abap2UI5

# Step 1: snapshot abap2UI5 (src/ + app/webapp) into input/abap2UI5/.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run mirror_abap2ui5
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add input/abap2UI5
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "mirror: update input/abap2UI5 ($(cut -c1-12 input/abap2UI5/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
