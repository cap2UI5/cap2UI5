name: update_samples

# Nightly, independent samples pipeline:
#   samples mirror -> samples transpile -> samples to CAP
# Refreshes cap2UI5/srv/app/samples from the abap2UI5/samples cloud branch.
# Runs on its own schedule, independent of update_backend / update_frontend.

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch:
  workflow_call: # chained by trigger_update

permissions:
  contents: write

concurrency:
  group: update_samples
  cancel-in-progress: false

jobs:
  mirror:
    uses: ./.github/workflows/samples_mirror.yml
  transpile:
    needs: mirror
    uses: ./.github/workflows/samples_transpile.yml
  to_cap:
    needs: transpile
    uses: ./.github/workflows/samples_to_cap.yml
