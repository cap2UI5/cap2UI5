name: abap2UI5 mirror

# Mirror the abap2UI5 framework ABAP sources (src/) into abap2UI5-js/run/input/abap2UI5/src.
# Step 1 of the update_backend pipeline; also runnable standalone.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm run mirror_abap2ui5
        working-directory: abap2UI5-js
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add abap2UI5-js/run/input/abap2UI5/src abap2UI5-js/run/input/abap2UI5/UPSTREAM_COMMIT
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "mirror: update abap2UI5-js/run/input/abap2UI5/src ($(cut -c1-12 abap2UI5-js/run/input/abap2UI5/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
