name: abap2UI5 to CAP

# Rebuild the core package (transpile/base + generated trees) and the CAP
# project (builder-cap/base + the core webapp)
# (assemble → publish) after the backend transpile refreshed run/output/abap2UI5.
# Jest gates the commit. Step 3 of the update_backend pipeline.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            transpile/package-lock.json
            transpile/core/package-lock.json
            cap2UI5/package-lock.json
            transpile/adapter/adapter-cap/package-lock.json
            transpile/adapter/adapter-node/package-lock.json
            transpile/adapter/adapter-express/package-lock.json
            transpile/adapter/adapter-web/package-lock.json
      - run: npm ci
        working-directory: transpile
      - run: npm ci
        working-directory: transpile/core
      - run: npm ci
        working-directory: cap2UI5
      # platform adapters — armed as smoke gates in the jest suite
      # (transpile/test/adapters.test.js skips them when not installed)
      - run: npm ci
        working-directory: transpile/adapter/adapter-cap
      - run: npm ci
        working-directory: transpile/adapter/adapter-node
      - run: npm ci
        working-directory: transpile/adapter/adapter-express
      - run: npm ci
        working-directory: transpile/adapter/adapter-web
      - run: npm run build_core
        working-directory: transpile
      - run: npm run build_cap
        working-directory: builder-cap
      - run: npm test
        working-directory: transpile
      - run: npm test
        working-directory: cap2UI5
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transpile/core cap2UI5
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "build: regenerate core + cap2UI5 (backend sync)"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
