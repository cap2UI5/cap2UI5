name: abap2UI5 to CAP

# Copy output/abap2UI5 into cap2UI5/srv/z2ui5 (fill-in only: hand-maintained
# CAP-adapted files are never overwritten). Jest gates the commit. Step 3 of
# the update_backend pipeline.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix cap2UI5
      - run: npm run copy_abap2ui5
      - run: npm test
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cap2UI5/srv/z2ui5
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "sync: copy abap2UI5 into cap2UI5/srv/z2ui5"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
