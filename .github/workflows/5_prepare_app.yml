name: 5 prepare app

# Step 5: build the ready-to-serve frontend into output/app —
# input/abap2UI5/app/webapp 1:1 plus the two cap2UI5 patches.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm run prepare_app
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/app
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "prepare: update output/app ($(cut -c1-12 input/abap2UI5/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
