name: trigger update

# Manually run all three sync pipelines back-to-back, in order:
#   update_samples -> update_backend -> update_frontend
# Each is the same reusable pipeline that also runs on its own nightly
# schedule; here they are chained so one dispatch refreshes everything.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  samples:
    uses: ./.github/workflows/update_samples.yml
  backend:
    needs: samples
    uses: ./.github/workflows/update_backend.yml
  frontend:
    needs: backend
    uses: ./.github/workflows/update_frontend.yml
