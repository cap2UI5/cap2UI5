name: app mirror

# Mirror the abap2UI5 static UI5 webapp (app/webapp) into
# transpile/run/input/app/webapp. Step 1 of the update_frontend pipeline;
# also runnable standalone.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm run mirror_app
        working-directory: transpile
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transpile/run/input/app/webapp transpile/run/input/app/UPSTREAM_COMMIT
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "mirror: update transpile/run/input/app/webapp ($(cut -c1-12 transpile/run/input/app/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
