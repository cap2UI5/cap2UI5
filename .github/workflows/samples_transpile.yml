name: samples transpile

# Transpile all sample classes from tools/run/input/samples/src into tools/run/output/samples
# (+ transpile report). Step 2 of the update_samples pipeline.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix cap2UI5
      - run: npm run transpile_samples
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/run/output/samples
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "transpile: update tools/run/output/samples ($(cut -c1-12 tools/run/input/samples/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
