name: samples to CAP

# Copy tools/run/output/samples into cap2UI5/srv/app/samples (flattened, overwrite,
# upstream deletions pruned). Jest gates the commit. Step 3 of update_samples.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix cap2UI5
      - run: npm run copy_samples
      - run: npm test
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cap2UI5/srv/app/samples
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "sync: copy samples into cap2UI5/srv/app/samples"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
