name: samples to CAP

# Rebuild the CAP project from builder/base + the generated trees
# (assemble → publish) after the samples transpile refreshed run/output/samples.
# Jest gates the commit. Step 3 of update_samples.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            builder/package-lock.json
            core/package-lock.json
            cap2UI5/package-lock.json
            adapter-cap/package-lock.json
            adapter-node/package-lock.json
            adapter-express/package-lock.json
            adapter-web/package-lock.json
      - run: npm ci
        working-directory: builder
      - run: npm ci
        working-directory: core
      - run: npm ci
        working-directory: cap2UI5
      # platform adapters — armed as smoke gates in the jest suite
      # (builder/test/adapters.test.js skips them when not installed)
      - run: npm ci
        working-directory: adapter-cap
      - run: npm ci
        working-directory: adapter-node
      - run: npm ci
        working-directory: adapter-express
      - run: npm ci
        working-directory: adapter-web
      - run: npm run build_cap
        working-directory: builder
      - run: npm test
        working-directory: builder
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add core cap2UI5
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "build: regenerate cap2UI5 (samples sync)"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
