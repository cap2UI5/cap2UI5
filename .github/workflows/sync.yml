name: sync pipeline

# Full pipeline: 1 mirror abap2UI5 -> 2 mirror samples -> 3 transpile abap2UI5
# -> 4 transpile samples -> 5 prepare app -> 6 copy into cap
# -> 7 trigger web (deploy-key push that starts web-cap2UI5's build).
# Every step also runs standalone via its own workflow. Manual follow-up work
# is what the TODO reports in output/*/transpile-report.json point at.
#
# Runs event-driven on every upstream update: abap2UI5's trigger_cap
# workflow refreshes input/abap2UI5/ and pushes it to main via deploy key
# (that push triggers this pipeline — the pipeline's own sync commits use
# GITHUB_TOKEN and therefore never retrigger it); samples (cloud branch
# rebuilt) sends a repository_dispatch via its trigger_cap workflow. The
# weekly cron remains as a safety net.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "input/abap2UI5/**"
  repository_dispatch:
    types: [upstream-update]
  schedule:
    - cron: "0 4 * * 1" # monday 04:00 UTC

permissions:
  contents: write

# Serialize pipeline runs: abap2UI5 and samples can dispatch in quick
# succession; overlapping runs would race on the sync commits.
concurrency:
  group: sync-pipeline
  cancel-in-progress: false

jobs:
  mirror_abap2ui5:
    uses: ./.github/workflows/1_mirror_abap2ui5.yml
  mirror_samples:
    needs: mirror_abap2ui5
    uses: ./.github/workflows/2_mirror_samples.yml
  transpile_abap2ui5:
    needs: mirror_samples
    uses: ./.github/workflows/3_transpile_abap2ui5.yml
  transpile_samples:
    needs: transpile_abap2ui5
    uses: ./.github/workflows/4_transpile_samples.yml
  prepare_app:
    needs: transpile_samples
    uses: ./.github/workflows/5_prepare_app.yml
  copy_into_cap:
    needs: prepare_app
    uses: ./.github/workflows/6_copy_into_cap.yml
  trigger_web:
    needs: copy_into_cap
    uses: ./.github/workflows/7_trigger_web.yml
    secrets: inherit # ACTION_KEY_WEB (deploy key for web-cap2UI5)
